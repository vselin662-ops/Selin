<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SELIN PAY | 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-primary: #0A0F17;
            --bg-secondary: rgba(25, 35, 50, 0.7);
            --accent-blue: #7B68EE;
            --accent-gold: #FFD700;
            --success: #00FF88;
            --error: #FF6B6B;
            --text-white: #FFFFFF;
            --text-silver: #B0B0B0;
            --border: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        /* Экраны */
        .screen {
            display: none;
            flex: 1;
            padding: 20px;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Авторизация */
        #auth-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-silver);
            margin-bottom: 30px;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--text-white);
        }

        .node-status {
            font-size: 9px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
            transition: all 0.5s ease;
        }

        .active .dot {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        /* Карточки */
        .glass-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(10, 15, 23, 0.3);
        }

        .balance-item {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 1.2rem;
        }

        /* Кнопки */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-gold));
            border: none;
            border-radius: 16px;
            padding: 14px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(123, 104, 238, 0.4);
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .method-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .method-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .form-group {
            margin: 20px 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-silver);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .payment-methods {
            margin: 20px 0;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .transaction-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .success {
            color: var(--success);
        }

        .error {
            color: var(--error);
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-silver);
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Экран авторизации -->
        <div id="auth-screen" class="screen active">
            <div class="auth-content">
                <svg id="logo" width="80" height="80"
