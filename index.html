<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELIN PAY | LUXURY 2026</title>
    <!-- ИСПРАВЛЕННАЯ 7 СТРОКА: Подключаем кошелек правильно -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1a1a2e 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            width: 320px;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border-radius: 42px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(15px);
        }

        h2 { font-weight: 200; letter-spacing: 6px; margin-bottom: 25px; color: #fff; }
        #ton-connect-button { margin-bottom: 20px; display: flex; justify-content: center; }
        #node-status { font-size: 9px; letter-spacing: 2px; margin-bottom: 15px; font-weight: 900; }
        .balance-val { font-size: 48px; font-weight: 100; margin: 10px 0 35px 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            color: #ccc;
            padding: 18px 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-blue);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .footer { margin-top: 35px; font-size: 9px; color: #333; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <h2>SELIN PAY</h2>
    
    <!-- Кнопка подключения (появится сама) -->
    <div id="ton-connect-button"></div>

    <div id="node-status" style="color: #ff3b30;">● NODE OFFLINE</div>
    
    <div style="color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Balance</div>
    <div class="balance-val" id="user-balance">0.00 <span style="font-size: 20px; color: #333;">₽</span></div>

    <div class="grid">
        <button onclick="alert('Временно недоступно')">Deposit</button>
        <button onclick="payTon()">TON Pay</button>
        <button onclick="alert('USDT на техобслуживании')">USDT</button>
        <button onclick="window.location.href='https://t.me'">Support</button>
    </div>

    <div class="footer">vselin662-ops // encrypted</div>
</div>

<script>
    // Инициализация системы TON
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://vselin662-ops.github.io',
        buttonRootId: 'ton-connect-button'
    });

    // Автоматическая смена статуса и баланса
    tonConnectUI.onStatusChange(wallet => {
        const status = document.getElementById('node-status');
        const bal = document.getElementById('user-balance');
        if (wallet) {
            status.innerText = '● NODE ACTIVE';
            status.style.color = '#00ffcc';
            bal.innerHTML = '145.00 <span style="font-size: 20px; color: #333;">₽</span>';
        } else {
            status.innerText = '● NODE OFFLINE';
            status.style.color = '#ff3b30';
            bal.innerHTML = '0.00 <span style="font-size: 20px; color: #333;">₽</span>';
        }
    });

    // Функция оплаты TON
    async function payTon() {
        if (!tonConnectUI.wallet) {
            alert('Сначала подключите кошелек синей кнопкой!');
            return;
        }
        const tx = {
            validUntil: Math.floor(Date.now() / 1000) + 300,
            messages: [{
                address: "UQCmsvJfKVODb1vxdqzilJqicSuhPs0JzNNmzn_4VLWKOEw7", // Ваш кошелек
                amount: "1000000000" // 1 TON
            }]
        };
        try { 
            await tonConnectUI.sendTransaction(tx); 
            alert('Запрос на оплату отправлен!');
        } catch (e) {
            alert('Оплата отменена пользователем');
        }
    }
</script>

</body>
</html>
