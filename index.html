<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN777 FINTECH PRO</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #030508; --card: #0d1117; --accent: #00a2ff; --text-dim: #4e5a6e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 20px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo-wrapper { display: flex; align-items: center; gap: 8px; }
        .logo-circle { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--accent); object-fit: cover; }
        .balance-card { background: linear-gradient(165deg, #121822 0%, #080c12 100%); border-radius: 35px; padding: 30px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .main-val { font-size: 58px; font-weight: 200; margin: 10px 0; }
        .live-rate { font-size: 10px; color: #00ff88; font-weight: 900; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; padding: 25px; text-align: center; transition: 0.2s; cursor: pointer; }
        .item:active { transform: scale(0.95); border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 162, 255, 0.3); }
        .item span { font-size: 26px; display: block; margin-bottom: 10px; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #0d1117; border-top: 2px solid var(--accent); border-radius: 35px 35px 0 0; padding: 30px 20px; transition: 0.4s; z-index: 2000; max-height: 85vh; overflow-y: auto; }
        .drawer.active { bottom: 0; }
        .op-item { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 18px; margin-bottom: 10px; font-weight: 700; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; backdrop-filter: blur(8px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-wrapper">
            <img src="logo.png" class="logo-circle" onerror="this.style.display='none'">
            <div style="font-size: 20px; font-weight: 900;">SELIN<span style="color:var(--accent)">777</span></div>
        </div>
        <div id="user-status" style="font-size: 10px; color: #00ff88; font-weight: 900;">● NODE ACTIVE</div>
    </div>

    <div class="balance-card">
        <div style="color: var(--text-dim); font-size: 11px; letter-spacing: 2px; font-weight: 800;">БАЛАНС SELIN PAY</div>
        <div class="main-val"><span id="user-balance">0.00</span> <span style="font-size: 28px; color: var(--text-dim);">₽</span></div>
        <div class="live-rate" id="rate">СИНХРОНИЗАЦИЯ...</div>
    </div>

    <div class="grid">
        <div class="item" onclick="openDeposit()"><span>📥</span><div>Внести</div></div>
        <div class="item" onclick="tgAlert('Вывод')"><span>📤</span><div>Вывод</div></div>
        <div class="item" onclick="tgAlert('Обмен')"><span>🔄</span><div>Обмен</div></div>
        <div class="item" onclick="tgAlert('Связь')"><span>📱</span><div>Связь</div></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeDeposit()"></div>
    <div class="drawer" id="deposit-drawer">
        <div style="text-align:center; margin-bottom:25px;"><h2 style="margin:0;">ПОПОЛНЕНИЕ</h2></div>
        <div class="op-item" onclick="initRealPay('RUB')"><span>🇷🇺 Рубли (RUB)</span> <span>₽</span></div>
        <div class="op-item" onclick="initRealPay('USD')"><span>🇺🇸 Доллары (USD)</span> <span>$</span></div>
        <div class="op-item" onclick="initRealPay('TON')"><span>💎 Toncoin (TON)</span></div>
        <div class="op-item" onclick="initRealPay('USDT')"><span>₮ Tether (USDT)</span></div>
        <button onclick="closeDeposit()" style="width:100%; background:none; border:none; color:#555; padding:20px; font-weight:800;">ОТМЕНА</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ССЫЛКА НА ТВОЙ ВЕРСЕЛЬ
        const BACKEND_URL = 'https://selin-backend.vercel.app';

        async function updateRate() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/rates`);
                const data = await res.json();
                document.getElementById('rate').innerText = `LIVE USDT: ${data.usdt_rub} ₽`;
            } catch (e) { document.getElementById('rate').innerText = "NODE ONLINE"; }
        }

        async function initRealPay(type) {
            tg.HapticFeedback.impactOccurred('heavy');
            try {
                const res = await fetch(`${BACKEND_URL}/api/pay`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: tg.initDataUnsafe.user?.id, currency: type })
                });
                const data = await res.json();
                tg.showAlert(data.message);
                closeDeposit();
            } catch (e) { tg.showAlert("Ошибка связи с сервером SELIN"); }
        }

        function openDeposit() {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('deposit-drawer').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeDeposit() {
            document.getElementById('deposit-drawer').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function tgAlert(n) { tg.showAlert(`Модуль "${n}" в разработке.`); }

        setInterval(updateRate, 30000);
        updateRate();
    </script>
</body>
</html>
