<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN PAY | Premium Web3</title>
    
    <!-- SDK для Telegram и TON -->
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050a10;
            --accent: #0088cc;
            --card: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #101926 0%, #050a10 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Шапка с лого и статусом */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 3px; color: var(--accent); }

        .status-badge {
            font-size: 10px;
            font-weight: 700;
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .dot { width: 7px; height: 7px; border-radius: 50%; background: #ff3b30; box-shadow: 0 0 10px #ff3b30; transition: 0.3s; }
        .active .dot { background: #00ff88; box-shadow: 0 0 15px #00ff88; }

        /* Карта баланса */
        .balance-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            padding: 45px 20px;
            text-align: center;
            backdrop-filter: blur(20px);
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .label { font-size: 11px; opacity: 0.4; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .amount { font-size: 52px; font-weight: 300; letter-spacing: -2px; }
        .amount span { font-size: 22px; opacity: 0.2; margin-left: 5px; }

        /* Сетка управления */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 25px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:active { transform: scale(0.94); background: rgba(255,255,255,0.08); border-color: var(--accent); }
        .btn i { font-size: 26px; }
        .btn span { font-size: 12px; font-weight: 600; opacity: 0.8; text-transform: uppercase; }

        /* Скрываем стандартную кнопку TON, чтобы использовать свой дизайн */
        #ton-connect-trigger { margin-bottom: 25px; display: flex; justify-content: center; }

        /* Лог для отладки на Pixel 8 */
        #system-log { position: fixed; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 9px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div class="app">
        <div class="header">
            <div class="logo">SELIN PAY</div>
            <div class="status-badge" id="node-box">
                <div class="dot"></div>
                <span id="node-text">OFFLINE</span>
            </div>
        </div>

        <!-- Коннектор кошелька -->
        <div id="ton-connect-trigger"></div>

        <div class="balance-card">
            <div class="label">Текущий баланс</div>
            <div class="amount" id="main-balance">0.00<span>TON</span></div>
        </div>

        <div class="grid">
            <div class="btn" onclick="ui('deposit')"><i>💳</i><span>Внести</span></div>
            <div class="btn" onclick="ui('withdraw')"><i>🚀</i><span>Вывод</span></div>
            <div class="btn" onclick="sendPayment()" style="background: rgba(0, 136, 204, 0.1);"><i>💎</i><span>Оплатить</span></div>
            <div class="btn" onclick="ui('usdt')"><i>₮</i><span>USDT</span></div>
        </div>
    </div>

    <div id="system-log">System: Pixel 8 / Android 16 Security Active</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://vselin662-ops.github.io',
            buttonRootId: 'ton-connect-trigger'
        });

        // Функция получения баланса из блокчейна
        async function refreshBalance(address) {
            try {
                const response = await fetch(`https://toncenter.com{address}`);
                const data = await response.json();
                if (data.ok) {
                    const balance = (parseInt(data.result.balance) / 10**9).toFixed(2);
                    document.getElementById('main-balance').innerHTML = `${balance}<span>TON</span>`;
                }
            } catch (e) { console.error("Blockchain error:", e); }
        }

        // Следим за статусом подключения
        tonConnectUI.onStatusChange(wallet => {
            const box = document.getElementById('node-box');
            const txt = document.getElementById('node-text');
            
            if (wallet) {
                box.classList.add('active');
                txt.innerText = 'NODE ACTIVE';
                tg.HapticFeedback.notificationOccurred('success');
                refreshBalance(wallet.account.address);
                // Авто-обновление каждые 30 сек
                setInterval(() => refreshBalance(wallet.account.address), 30000);
            } else {
                box.classList.remove('active');
                txt.innerText = 'OFFLINE';
            }
        });

        // Универсальные действия
        function ui(type) {
            tg.HapticFeedback.impactOccurred('medium');
            if(type === 'deposit') tg.showAlert("Для пополнения используйте кнопку TON");
            else tg.showAlert("Сервис " + type.toUpperCase() + " на техническом обслуживании.");
        }

        // Главная функция оплаты
        async function sendPayment() {
            tg.HapticFeedback.impactOccurred('heavy');
            
            if (!tonConnectUI.connected) {
                tg.showPopup({
                    title: "Внимание",
                    message: "Сначала подключите ваш TON кошелек",
                    buttons:
                });
                return;
            }

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 120, // 2 минуты
                messages: [{
                    address: "UQCJqiuwFj-TzWMK9XwTzS-v-TaaGc37PaemsMHfmQ-bnDon", // Твой кошелек
                    amount: "1000000000" // 1 TON в нанотонах
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Запрос отправлен! Баланс обновится после подтверждения сетью.");
            } catch (e) {
                tg.HapticFeedback.notificationOccurred('error');
                console.error("TX Error:", e);
            }
        }
    </script>
</body>
</html>
