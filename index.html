<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN PAY | Crypto Ecosystem</title>
    
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --bg: #070b10; --accent: #0088cc; --selin: #00d4ff; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow-y: auto; display: flex; justify-content: center; }
        
        .app { width: 100%; max-width: 400px; padding: 25px; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; border: 1px solid var(--accent); }
        .brand { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
        
        .node { font-size: 10px; font-weight: 700; padding: 6px 14px; border-radius: 30px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3b30; transition: 0.3s; }
        .active .dot { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        /* Карточка активов */
        .asset-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 30px 20px; margin-bottom: 25px; backdrop-filter: blur(20px); }
        .asset-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding: 10px 0; }
        .asset-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .asset-info { text-align: left; }
        .asset-name { font-size: 12px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
        .asset-val { font-size: 32px; font-weight: 300; }
        .asset-val span { font-size: 16px; opacity: 0.3; margin-left: 4px; }
        .selin-color { color: var(--selin); text-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; padding: 25px 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
        .btn i { font-size: 26px; display: block; margin-bottom: 10px; }
        .btn span { font-size: 11px; font-weight: 700; opacity: 0.6; text-transform: uppercase; }

        #ton-connect-btn { margin-bottom: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo-box">
            <!-- Логотип из твоего репозитория -->
            <img src="logo.png" class="logo-img" alt="L" onerror="this.style.display='none'">
            <div class="brand">SELIN PAY</div>
        </div>
        <div class="node" id="status">
            <div class="dot"></div> <span id="st-txt">OFFLINE</span>
        </div>
    </div>

    <div id="ton-connect-btn"></div>

    <div class="asset-card">
        <!-- Основной TON -->
        <div class="asset-row">
            <div class="asset-info">
                <div class="asset-name">Main Asset</div>
                <div class="asset-val" id="ton-bal">0.00<span>TON</span></div>
            </div>
            <div style="font-size: 24px;">💎</div>
        </div>
        
        <!-- Твоя монета SLN -->
        <div class="asset-row">
            <div class="asset-info">
                <div class="asset-name" style="color: var(--selin); opacity: 0.8;">Selin Ecosystem</div>
                <div class="asset-val selin-color" id="sln-bal">0.00<span>SLN</span></div>
            </div>
            <div style="font-size: 24px;">🚀</div>
        </div>
    </div>

    <div class="grid">
        <div class="btn" onclick="act('dep')"><i>💳</i><span>Внести</span></div>
        <div class="btn" onclick="act('out')"><i>🚀</i><span>Вывод</span></div>
        <div class="btn" onclick="pay()"><i>💎</i><span>TON PAY</span></div>
        <div class="btn" onclick="act('swap')"><i>🔄</i><span>Обмен SLN</span></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const tonUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://vselin662-ops.github.io',
        buttonRootId: 'ton-connect-btn'
    });

    const h = (s) => tg.HapticFeedback.impactOccurred(s);

    async function updateData(addr) {
        try {
            // Получаем баланс TON
            const r = await fetch(`https://toncenter.com{addr}`);
            const d = await r.json();
            if(d.ok) {
                document.getElementById('ton-bal').innerHTML = `${(d.result.balance / 1e9).toFixed(2)}<span>TON</span>`;
            }
            // Здесь будет логика для SLN, когда развернешь Jetton
            document.getElementById('sln-bal').innerHTML = `1000.00<span>SLN</span>`; 
        } catch(e) {}
    }

    tonUI.onStatusChange(w => {
        const s = document.getElementById('status');
        if (w) {
            s.classList.add('active');
            document.getElementById('st-txt').innerText = 'NODE ACTIVE';
            h('heavy');
            updateData(w.account.address);
        } else {
            s.classList.remove('active');
            document.getElementById('st-txt').innerText = 'OFFLINE';
        }
    });

    function act(type) {
        h('medium');
        tg.showAlert("Модуль " + type.toUpperCase() + " адаптирован под Pixel 8. Ожидание синхронизации...");
    }

    async function pay() {
        if (!tonUI.connected) return tg.showAlert("Подключите кошелек!");
        try {
            await tonUI.sendTransaction({
                validUntil: Math.floor(Date.now() / 1000) + 120,
                messages: [{ address: "UQCJqiuwFj-TzWMK9XwTzS-v-TaaGc37PaemsMHfmQ-bnDon", amount: "1000000000" }]
            });
            tg.HapticFeedback.notificationOccurred('success');
        } catch (e) { h('error'); }
    }
</script>
</body>
</html>
