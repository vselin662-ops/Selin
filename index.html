        :root {
            --bg-color: #020408;
            --accent-color: #00d4ff;

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;

        }

        .app-wrapper {
            flex: 1;
            padding: calc(1.5rem + var(--safe-area-top)) 1.2rem 0;

            flex-direction: column;
            gap: 1.5rem;

        /* --- КАРТОЧКА БАЛАНСА --- */
        .balance-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
            padding: 2rem;
            backdrop-filter: blur(20px);
            text-align: center;
        }
        .balance-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 8px; }
        .balance-main { font-size: 3rem; font-weight: 300; margin-bottom: 10px; }
        .balance-sub { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--accent-color); font-weight: 700; }
        /* ЛОГОТИП ВАЛЮТЫ */
        .coin-logo { width: 22px; height: 22px; }

        /* --- КНОПКА ВАЖНО ЗНАТЬ --- */
        .important-btn {
            background: linear-gradient(90deg, rgba(255, 149, 0, 0.15), rgba(255, 59, 48, 0.15));
            border: 1px solid var(--warn-color);
            border-radius: 1.5rem;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            animation: pulse-warn 2s infinite;
        }
        @keyframes pulse-warn {
            0% { box-shadow: 0 0 0 rgba(255, 149, 0, 0); }
            50% { box-shadow: 0 0 15px rgba(255, 149, 0, 0.3); }
            100% { box-shadow: 0 0 0 rgba(255, 149, 0, 0); }
        }

        /* --- СЕТКА КНОПОК --- */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .action-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 1.5rem;
            border-radius: 1.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.1); }
        .btn-img { width: 35px; height: 35px; }
        .btn-text { font-size: 0.8rem; font-weight: 800; letter-spacing: 1px; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 2000; display: none; opacity: 0; transition: 0.3s;
        }
        .modal-content {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0a0d14; border-top: 2px solid var(--accent-color);
            border-radius: 2.5rem 2.5rem 0 0; padding: 2.2rem;

        .modal-overlay.show { display: block; opacity: 1; }

        .dl-button {
            margin-top: 25px;
            background: var(--accent-color);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Orbitron';

        .active .nav-icon { opacity: 1; filter: drop-shadow(0 0 5px var(--accent-color)); }

    </style>
</head>
