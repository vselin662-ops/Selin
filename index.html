<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN PAY | LIVE</title>
    
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --bg: #050a10; --accent: #0088cc; --sln: #00d4ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .shell { width: 100%; max-width: 400px; padding: 25px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        
        /* КНОПКА АКТИВАЦИИ - ГЛАВНЫЙ ЭЛЕМЕНТ */
        #connect-trigger {
            background: var(--accent);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 30px; margin-bottom: 30px; }
        .val { font-size: 42px; font-weight: 400; margin-bottom: 10px; }
        .val span { font-size: 18px; opacity: 0.3; margin-left: 5px; }
        .sln { color: var(--sln); text-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: rgba(255,255,255,0.05); border-radius: 25px; padding: 20px; text-align: center; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .active-btn { opacity: 1; pointer-events: auto; background: rgba(255,255,255,0.1); border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="shell">
    <div class="header">
        <div class="logo">SELIN PAY</div>
        <div id="status" style="color: #ff4444; font-size: 10px; font-weight: 900;">OFFLINE</div>
    </div>

    <!-- Пока не нажмешь - кнопки внизу не заработают -->
    <div id="connect-trigger" onclick="connect()">АКТИВИРОВАТЬ СИСТЕМУ</div>

    <div class="card">
        <div class="val" id="ton-b">0.00<span>TON</span></div>
        <div class="val sln" id="sln-b">0.00<span>SLN</span></div>
    </div>

    <div class="grid">
        <div class="btn action-btn">Внести</div>
        <div class="btn action-btn">Вывод</div>
        <div class="btn action-btn" style="grid-column: span 2;" onclick="pay()">Оплатить 1 TON</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Инициализация TON Connect
    const tonUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://vselin662-ops.github.io'
    });

    // Функция нажатия на главную кнопку
    async function connect() {
        tg.HapticFeedback.impactOccurred('heavy');
        try {
            await tonUI.openModal();
        } catch (e) {
            tg.showAlert("Откройте Tonkeeper для активации.");
        }
    }

    // Когда кошелек подключится - оживляем всё остальное
    tonUI.onStatusChange(async (wallet) => {
        if (wallet) {
            document.getElementById('status').innerText = 'NODE ACTIVE';
            document.getElementById('status').style.color = '#00ff88';
            document.getElementById('connect-trigger').style.display = 'none';
            
            // Оживляем кнопки
            document.querySelectorAll('.action-btn').forEach(b => b.classList.add('active-btn'));
            
            tg.HapticFeedback.notificationOccurred('success');
            
            // Считываем реальные данные из блокчейна
            const addr = wallet.account.address;
            const r = await fetch(`https://toncenter.com{addr}`);
            const d = await r.json();
            if(d.ok) {
                document.getElementById('ton-b').innerHTML = `${(d.result.balance / 1e9).toFixed(2)}<span>TON</span>`;
            }
            // Твои 10 миллионов SLN (мы их увидим, когда ты пришлешь адрес контракта)
            document.getElementById('sln-b').innerHTML = `10,000,000<span>SLN</span>`;
        }
    });

    async function pay() {
        tg.HapticFeedback.impactOccurred('medium');
        await tonUI.sendTransaction({
            validUntil: Math.floor(Date.now() / 1000) + 60,
            messages: [{ address: "UQCJqiuwFj-TzWMK9XwTzS-v-TaaGc37PaemsMHfmQ-bnDon", amount: "1000000000" }]
        });
    }
</script>
</body>
</html>
