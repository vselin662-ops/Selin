<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN777 Secure Node</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: #060b13;
            --card-bg: rgba(13, 20, 33, 0.7);
            --accent: #3a86ff;
            --text-secondary: #5d6b81;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка приложения */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }
        
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 35px; height: 35px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
        .logo-text span { color: var(--accent); }

        .btn-login {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 12px;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Главная карта кошелька */
        .wallet-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 30px;
            flex-grow: 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            position: relative;
        }

        .label { color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .status { position: absolute; top: 30px; right: 30px; text-align: right; }
        .status-text { color: #f4a261; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .balance { font-size: 68px; font-weight: 400; margin: 10px 0; color: #fff; }
        .currency { color: var(--text-secondary); font-size: 24px; margin-top: -10px; }

        /* Сетка кнопок */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            color: #ccc;
        }

        .grid-item:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.96); }

        /* Нижний таб-бар */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 80px;
            border-top: 1px solid var(--accent);
            background: linear-gradient(to top, rgba(58, 134, 255, 0.1), transparent);
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-box">
            <div class="logo-icon">S</div>
            <div class="logo-text">SELIN<span>777</span></div>
        </div>
        <button class="btn-login" onclick="login()">Войти</button>
    </div>

    <div class="wallet-card">
        <div class="status">
            <div class="status-text" style="color: #555;">Ожидание</div>
            <div class="status-text" style="color: #f4a261;">Авторизации</div>
        </div>
        <div class="label">Активы кошелька</div>
        <div class="balance">0.00</div>
        <div class="currency">₽</div>
    </div>

    <div class="grid">
        <div class="grid-item" onclick="action('Внести')">Внести</div>
        <div class="grid-item" onclick="action('Вывод')">Вывод</div>
        <div class="grid-item" onclick="action('Обмен')">Обмен</div>
        <div class="grid-item" onclick="action('Стейкинг')" style="opacity: 0.3;">Стейкинг</div>
    </div>

    <div class="bottom-nav">
        <div style="width: 40px; height: 3px; background: var(--accent); border-radius: 10px; box-shadow: 0 0 15px var(--accent);"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#060b13');
        tg.setBackgroundColor('#060b13');

        function login() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showAlert("Система авторизации будет доступна после настройки бота.");
        }

        function action(name) {
            tg.HapticFeedback.selectionChanged();
            tg.showAlert(`Функция "${name}" в разработке`);
        }
    </script>
</body>
</html>
