<!DOCTYPE html>

        body { background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .font-display { font-family: 'Orbitron', sans-serif; }
        
        /* Шум и текстура */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04; pointer-events: none; z-index: 999;

        /* Анимация вращения кольца логотипа */
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hud-border { border: 1px solid rgba(0,242,255,0.15); position: relative; }
        .hud-border::before {
            content: ''; position: absolute; top: -1px; left: -1px; width: 8px; height: 8px;
            border-top: 2px solid var(--neon); border-left: 2px solid var(--neon);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 1px); }
            4% { transform: translate(2px, -1px); opacity: 0.8; }

</head>
