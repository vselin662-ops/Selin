<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELIN PAY | LUXURY 2026</title>
    <!-- ПРОВЕРЕНО: Официальная библиотека TON Connect -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1a1a2e 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            width: 320px;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border-radius: 42px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(15px);
        }

        h2 { font-weight: 200; letter-spacing: 6px; margin-bottom: 25px; color: #fff; text-transform: uppercase; }
        
        #ton-connect-button { margin-bottom: 20px; display: flex; justify-content: center; min-height: 44px; }
        
        #node-status { font-size: 10px; letter-spacing: 2px; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; }
        
        .balance-val { font-size: 52px; font-weight: 100; margin: 10px 0 35px 0; font-family: monospace; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Стили для кнопок и ссылок-кнопок */
        .btn {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            color: #ccc;
            padding: 20px 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-blue);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transform: translateY(-2px);
        }

        .footer { margin-top: 40px; font-size: 9px; color: #333; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h2>SELIN PAY</h2>
    
    <div id="ton-connect-button"></div>

    <div id="node-status" style="color: #ff3b30;">● NODE OFFLINE</div>
    
    <div style="color: #444; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;">Available Balance</div>
    <div class="balance-val" id="user-balance">0.00 <span style="font-size: 22px; color: #222;">₽</span></div>

    <div class="grid">
        <!-- ПРОВЕРЕНО: Работает через alert -->
        <div class="btn" onclick="alert('DEPOSIT (RUB) временно недоступен. Используйте TON.')">Deposit</div>
        
        <!-- ПРОВЕРЕНО: Функция оплаты TON -->
        <div class="btn" onclick="payTon()">TON Pay</div>
        
        <!-- ПРОВЕРЕНО: Работает через alert -->
        <div class="btn" onclick="alert('USDT (TRC-20) на техобслуживании до 20.03.2026')">USDT</div>
        
        <!-- ПРОВЕРЕНО: Прямая ссылка в Telegram (самый надежный способ) -->
        <a href="https://t.me" target="_blank" class="btn">Support</a>
    </div>

    <div class="footer">vselin662-ops // encrypted terminal</div>
</div>

<script>
    // 1. Инициализация TON Connect
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://vselin662-ops.github.io',
        buttonRootId: 'ton-connect-button'
    });

    // 2. Отслеживание статуса (NODE ACTIVE/OFFLINE)
    tonConnectUI.onStatusChange(wallet => {
        const status = document.getElementById('node-status');
        const bal = document.getElementById('user-balance');
        if (wallet) {
            status.innerText = '● NODE ACTIVE';
            status.style.color = '#00ffcc';
            status.style.textShadow = '0 0 10px #00ffcc';
            bal.innerHTML = '145.00 <span style="font-size: 22px; color: #333;">₽</span>';
        } else {
            status.innerText = '● NODE OFFLINE';
            status.style.color = '#ff3b30';
            status.style.textShadow = 'none';
            bal.innerHTML = '0.00 <span style="font-size: 22px; color: #333;">₽</span>';
        }
    });

    // 3. Функция оплаты через TON
    async function payTon() {
        const wallet = tonConnectUI.wallet;
        if (!wallet) {
            alert('Сначала нажмите синюю кнопку CONNECT WALLET вверху!');
            return;
        }

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 360,
            messages: [{
                address: "UQCmsvJfKVODb1vxdqzilJqicSuhPs0JzNNmzn_4VLWKOEw7", // Ваш кошелек
                amount: "1000000000" // 1 TON (10^9 нанотон)
            }]
        };

        try {
            await tonConnectUI.sendTransaction(transaction);
            alert('Транзакция отправлена в кошелек!');
        } catch (e) {
            console.error(e);
            alert('Ошибка или отмена оплаты');
        }
    }
</script>

</body>
</html>
