<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selin UI - Prestige Edition</title>
    <!-- Подключаем стили и шрифты -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --bg: #020408; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .font-display { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .scanline { width: 100%; height: 100px; background: linear-gradient(0deg, transparent, rgba(0,242,255,0.05), transparent); position: absolute; animation: scan 8s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }
        .logo-ring { border: 1px dashed rgba(0,242,255,0.3); border-radius: 50%; position: absolute; animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Подключаем React и библиотеки через CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Компонент приложения
        function App() {
            const [isReg, setIsReg] = useState(false);
            
            useEffect(() => {
                // Инициализация иконок Lucide
                lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen relative flex flex-col p-6 pb-32">
                    <div className="scanline"></div>
                    
                    {/* Header */}
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-4">
                            <div className="relative w-16 h-16 flex items-center justify-center">
                                <div className="logo-ring inset-0"></div>
                                <div className="relative w-12 h-12 rounded-full border-2 border-cyan-400 overflow-hidden shadow-[0_0_20px_rgba(0,242,255,0.5)]">
                                    <img src="https://raw.githubusercontent.com/vselin662-ops/Selin/main/logo.png" className="w-full h-full object-cover" />
                                </div>
                            </div>
                            <div>
                                <h1 className="font-display text-2xl tracking-widest text-white">SELIN</h1>
                                <p className="text-[8px] text-cyan-400 tracking-[3px] uppercase opacity-60">Prestige Edition</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="bg-green-500/10 border border-green-500/30 text-green-400 text-[9px] px-3 py-1 rounded-full font-bold uppercase tracking-wider">
                                ● ЗАЩИЩЕНО
                            </div>
                        </div>
                    </header>

                    {/* Балансы */}
                    <div className="grid grid-cols-3 gap-2 mb-10">
                        {[
                            { l: 'Престиж', v: '0.00', s: 'SLN', c: 'text-cyan-400' },
                            { l: 'Основной', v: '0.00', s: 'TON', c: 'text-blue-400' },
                            { l: 'Резерв', v: '0.00', s: 'USDT', c: 'text-green-400' }
                        ].map((a, i) => (
                            <div key={i} className="glass p-4 rounded-2xl text-center">
                                <p className="text-[8px] text-gray-500 uppercase mb-1">{a.l}</p>
                                <p className="text-sm font-bold">{a.v}</p>
                                <p className={`text-[8px] font-bold ${a.c}`}>{a.s}</p>
                            </div>
                        ))}
                    </div>

                    {/* Кнопки действий */}
                    <div className="grid grid-cols-3 gap-4 mb-10">
                        {[
                            { i: 'arrow-down-left', l: 'ВНЕСТИ', c: 'text-cyan-400' },
                            { i: 'arrow-up-right', l: 'ВЫВОД', c: 'text-red-400' },
                            { i: 'refresh-cw', l: 'ОБМЕН', c: 'text-purple-400' }
                        ].map((btn, i) => (
                            <button key={i} className="glass aspect-square rounded-2xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
                                <i data-lucide={btn.i} className={btn.c}></i>
                                <span className="text-[8px] font-bold text-gray-400">{btn.l}</span>
                            </button>
                        ))}
                    </div>

                    {/* Важное */}
                    <div className="glass border-red-500/20 p-4 rounded-2xl flex items-center gap-4 mb-10">
                        <div className="text-xl">🚨</div>
                        <div>
                            <p className="text-red-500 font-bold text-[10px] uppercase">ВАЖНО ЗНАТЬ</p>
                            <p className="text-gray-500 text-[8px]">Аналитика угроз и регламент безопасности</p>
                        </div>
                    </div>

                    {/* Навигация */}
                    <nav className="fixed bottom-0 left-0 w-full glass border-t border-white/5 flex justify-around p-6 pb-10">
                        <button className="text-cyan-400 flex flex-col items-center gap-1">
                            <i data-lucide="home"></i>
                            <span className="text-[9px] font-bold">ГЛАВНАЯ</span>
                        </button>
                        <button className="text-gray-500 flex flex-col items-center gap-1">
                            <i data-lucide="wallet"></i>
                            <span className="text-[9px] font-bold">КОШЕЛЕК</span>
                        </button>
                        <button className="text-gray-500 flex flex-col items-center gap-1">
                            <i data-lucide="shield"></i>
                            <span className="text-[9px] font-bold">ЗАЩИТА</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
