<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELIN PAY - Личный кабинет</title>
    <!-- Подключаем скрипт TON Connect для работы с кошельками -->
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { border: 1px solid #333; border-radius: 24px; padding: 30px; margin: 0 auto; max-width: 380px; background: #0a0a0a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { letter-spacing: 2px; margin-bottom: 10px; color: #fff; }
        #node-status { font-size: 12px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; text-transform: uppercase; }
        #balance { font-size: 42px; margin: 20px 0; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button { padding: 16px; border-radius: 14px; border: none; cursor: pointer; background: #1c1c1e; color: #fff; font-weight: 600; font-size: 14px; transition: 0.2s; }
        button:hover { background: #2c2c2e; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        #ton-connect-button { margin-bottom: 20px; display: flex; justify-content: center; }
        .footer-text { margin-top: 20px; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="card">
        <h2>SELIN PAY</h2>
        
        <!-- Кнопка подключения кошелька -->
        <div id="ton-connect-button"></div>

        <div id="node-status" style="color: #ff4444;">NODE OFFLINE</div>
        
        <div style="color: #888; font-size: 14px;">Ваш баланс</div>
        <div id="balance">0.00 ₽</div>

        <div class="btn-group">
            <button onclick="pay('RUB')">💳 Внести (₽)</button>
            <button onclick="pay('TON')">💎 TON</button>
            <button onclick="pay('USDT')">💵 USDT</button>
            <button onclick="window.location.href='https://t.me'">💬 Связь</button>
        </div>
        
        <div class="footer-text">vselin662-ops ecosystem</div>
    </div>

    <script>
        // 1. Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://vselin662-ops.github.io',
            buttonRootId: 'ton-connect-button'
        });

        // 2. Автоматическая смена статуса NODE при подключении
        tonConnectUI.onStatusChange(wallet => {
            const status = document.getElementById('node-status');
            if (wallet) {
                status.innerText = 'NODE ACTIVE';
                status.style.color = '#00ff88'; 
                console.log('Подключен кошелек:', wallet.account.address);
            } else {
                status.innerText = 'NODE OFFLINE';
                status.style.color = '#ff4444';
            }
        });

        // 3. Логика платежей
        async function pay(method) {
            const wallet = tonConnectUI.wallet;
            
            if (!wallet && (method === 'TON' || method === 'USDT')) {
                alert('Сначала нажмите кнопку "Connect Wallet" вверху!');
                return;
            }

            if (method === 'TON') {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 360,
                    messages: [
                        {
                            address: "UQCmsvJfKVODb1vxdqzilJqicSuhPs0JzNNmzn_4VLWKOEw7", // Ваш кошелек
                            amount: "1000000000" // Пример: 1 TON (можно менять)
                        }
                    ]
                };
                try {
                    await tonConnectUI.sendTransaction(transaction);
                    alert('Запрос отправлен! Подтвердите транзакцию в вашем приложении кошелька.');
                } catch (e) {
                    alert('Ошибка: транзакция отклонена или кошелек не поддерживает операцию.');
                }
            } 
            
            else if (method === 'USDT') {
                alert('Оплата USDT в сети TON будет доступна после настройки смарт-контракта.');
            } 
            
            else if (method === 'RUB') {
                alert('Перенаправление на оплату картой...');
                // Здесь можно вставить ссылку на ваш платежный шлюз
            }
        }
    </script>
</body>
</html>
