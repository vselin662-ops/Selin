<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Selin Luxury App</title>
    <script src="https://telegram.org"></script>
    <style>
        /* ТРЕНДЫ 2026: Глубокие тени и размытие */
        :root {
            --tg-theme-bg-color: #000;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Люксовая карточка товара */
        .premium-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-top: 50px;
        }

        .product-img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--accent));
        }

        .price-tag {
            font-size: 32px;
            font-weight: 900;
            margin: 15px 0;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .buy-button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buy-button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <div class="premium-card">
        <img src="IMG_20260304_134158_002.webp" class="product-img" alt="Luxury Item">
        <h2>Selin Premium Access</h2>
        <p style="color: #888;">Эксклюзивный доступ к закрытым функциям 2026</p>
        <div class="price-tag">50 STARS</div>
        <button class="buy-button" onclick="initPayment()">КУПИТЬ СЕЙЧАС</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function initPayment() {
            // Вибрация при нажатии
            tg.HapticFeedback.impactOccurred('heavy');
            
            // ВАЖНО: GitHub не может сам выставить счет. 
            // Мы отправляем данные боту через метод sendData
            const orderData = {
                item: "Premium Access",
                price: 50
            };
            
            tg.sendData(JSON.stringify(orderData));
            // После этого бот получит сообщение и выставит счет (Invoice)
        }
    </script>
</body>
</html>
