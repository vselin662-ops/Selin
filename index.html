<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selin UI - Prestige Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --bg: #020408; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .font-display { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .scanline { width: 100%; height: 100px; background: linear-gradient(0deg, transparent, rgba(0,242,255,0.05), transparent); position: absolute; animation: scan 8s linear infinite; pointer-events: none; z-index: 10; }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }
        .logo-ring { border: 1px dashed rgba(0,242,255,0.2); border-radius: 50%; position: absolute; animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--cyan); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const translations = {
            ru: {
                reg: "РЕГИСТРАЦИЯ", main: "ГЛАВНАЯ", wallet: "КОШЕЛЕК", safety: "ЗАЩИТА",
                deposit: "ВНЕСТИ", withdraw: "ВЫВОД", swap: "ОБМЕН", mobile: "СВЯЗЬ",
                reports: "ОТЧЕТЫ", stake: "СТЕЙКИНГ", important: "ВАЖНО ЗНАТЬ",
                desc: "Аналитика угроз и регламент безопасности",
                welcome: "Добро пожаловать в Selin", choose: "Выберите метод регистрации",
                identifying: "Идентификация личности...", verified: "ПОДТВЕРЖДЕНО"
            },
            en: {
                reg: "REGISTRATION", main: "MAIN", wallet: "WALLET", safety: "SAFETY",
                deposit: "DEPOSIT", withdraw: "WITHDRAW", swap: "SWAP", mobile: "MOBILE",
                reports: "REPORTS", stake: "STAKING", important: "IMPORTANT",
                desc: "Threat analytics and safety protocol",
                welcome: "Welcome to Selin", choose: "Choose registration method",
                identifying: "Identifying...", verified: "VERIFIED"
            }
        };

        function App() {
            const [lang, setLang] = useState('ru');
            const [modal, setModal] = useState(null);
            const [isReg, setIsReg] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const t = translations[lang];

            useEffect(() => { lucide.createIcons(); }, [modal, isReg, isScanning, lang]);

            const handleReg = (method) => {
                if (method === 'retina') {
                    setIsScanning(true);
                    setTimeout(() => { setIsScanning(false); setIsReg(true); setModal(null); }, 4000);
                } else {
                    setIsReg(true); setModal(null);
                }
            };

            return (
                <div className="min-h-screen relative flex flex-col p-6 pb-32 overflow-y-auto custom-scroll">
                    <div className="scanline"></div>
                    
                    {/* Header */}
                    <header className="flex justify-between items-start mb-10 z-20">
                        <div className="flex items-center gap-4">
                            <div className="relative w-16 h-16 flex items-center justify-center">
                                <div className="logo-ring inset-0"></div>
                                <div className="relative w-12 h-12 rounded-full border-2 border-cyan-400 overflow-hidden shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                                    <img src="https://raw.githubusercontent.com/vselin662-ops/Selin/main/logo.png" className="w-full h-full object-cover" />
                                </div>
                            </div>
                            <div>
                                <h1 className="font-display text-2xl tracking-widest text-white">SELIN</h1>
                                <p className="text-[8px] text-cyan-400 tracking-[3px] uppercase opacity-60">Prestige Edition</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-2">
                            {!isReg && (
                                <button onClick={() => setModal('reg')} className="bg-cyan-400 text-black text-[9px] px-4 py-1.5 rounded-full font-black uppercase tracking-wider shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                                    {t.reg}
                                </button>
                            )}
                            <div className="flex bg-white/5 p-0.5 rounded-lg border border-white/10">
                                {['ru', 'en'].map(l => (
                                    <button key={l} onClick={() => setLang(l)} className={`px-2 py-1 text-[8px] font-bold rounded ${lang === l ? 'bg-cyan-400 text-black' : 'text-gray-500'}`}>
                                        {l.toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* Балансы */}
                    <div className="grid grid-cols-3 gap-2 mb-8 z-20">
                        {[
                            { l: lang === 'ru' ? 'Престиж' : 'Prestige', v: '0.00', s: 'SLN', c: 'text-cyan-400' },
                            { l: lang === 'ru' ? 'Основной' : 'Main', v: '0.00', s: 'TON', c: 'text-blue-400' },
                            { l: lang === 'ru' ? 'Резерв' : 'Reserve', v: '0.00', s: 'USDT', c: 'text-green-400' }
                        ].map((a, i) => (
                            <div key={i} className="glass p-4 rounded-2xl text-center border-white/5">
                                <p className="text-[7px] text-gray-500 uppercase mb-1 tracking-widest">{a.l}</p>
                                <p className="text-sm font-bold tracking-tighter">{a.v}</p>
                                <p className={`text-[7px] font-black ${a.c}`}>{a.s}</p>
                            </div>
                        ))}
                    </div>

                    {/* Кнопки действий */}
                    <div className="grid grid-cols-3 gap-4 mb-8 z-20">
                        {[
                            { i: 'arrow-down-left', l: t.deposit, c: 'text-cyan-400', m: 'deposit' },
                            { i: 'arrow-up-right', l: t.withdraw, c: 'text-red-400', m: 'withdraw' },
                            { i: 'refresh-cw', l: t.swap, c: 'text-purple-400', m: 'swap' },
                            { i: 'smartphone', l: t.mobile, c: 'text-blue-400', m: 'mobile' },
                            { i: 'zap', l: t.stake, c: 'text-yellow-400', m: 'stake' },
                            { i: 'bar-chart-3', l: t.reports, c: 'text-orange-400', m: 'reports' }
                        ].map((btn, i) => (
                            <button key={i} onClick={() => setModal(btn.m)} className="glass aspect-square rounded-3xl flex flex-col items-center justify-center gap-2 active:scale-90 transition-all border-white/5 hover:border-white/20">
                                <i data-lucide={btn.i} className={`${btn.c} w-5 h-5`}></i>
                                <span className="text-[7px] font-black text-gray-500 tracking-widest">{btn.l}</span>
                            </button>
                        ))}
                    </div>

                    {/* Важное */}
                    <button onClick={() => setModal('safety')} className="glass border-red-500/20 p-5 rounded-3xl flex items-center gap-4 mb-10 active:scale-95 transition-all z-20">
                        <div className="text-2xl filter drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]">🚨</div>
                        <div className="text-left">
                            <p className="text-red-500 font-black text-[10px] uppercase tracking-widest">{t.important}</p>
                            <p className="text-gray-500 text-[8px] uppercase tracking-tighter">{t.desc}</p>
                        </div>
                    </button>

                    {/* Модальное окно */}
                    {modal && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center">
                            <div onClick={() => setModal(null)} className="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
                            <div className="relative w-full bg-[#05070a] border-t border-white/10 rounded-t-[40px] p-8 pb-12 animate-slide-up">
                                <div className="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
                                <h2 className="text-center font-display text-white tracking-widest mb-8 uppercase">{modal}</h2>
                                
                                {modal === 'reg' ? (
                                    <div className="grid gap-3">
                                        <button onClick={() => handleReg('tg')} className="glass p-4 rounded-2xl flex items-center gap-4"><i data-lucide="message-circle" className="text-blue-400"></i> Telegram</button>
                                        <button onClick={() => handleReg('gm')} className="glass p-4 rounded-2xl flex items-center gap-4"><i data-lucide="mail" className="text-red-400"></i> Gmail</button>
                                        <button onClick={() => handleReg('retina')} className="glass p-4 rounded-2xl flex items-center gap-4 border-cyan-500/30"><i data-lucide="eye" className="text-cyan-400"></i> {lang === 'ru' ? 'Сетчатка глаз' : 'Retina Scan'}</button>
                                    </div>
                                ) : (
                                    <div className="text-center py-10 text-gray-500 text-xs uppercase tracking-widest">
                                        Модуль {modal} активен. Баланс: 0.00
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Сканер сетчатки */}
                    {isScanning && (
                        <div className="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center p-10">
                            <div className="relative w-64 h-64 border-2 border-cyan-500/20 rounded-[40px] flex items-center justify-center overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-cyan-400 shadow-[0_0_20px_cyan] animate-scan-fast"></div>
                                <i data-lucide="eye" className="w-20 h-20 text-cyan-400 animate-pulse"></i>
                            </div>
                            <p className="mt-10 font-display text-cyan-400 text-xs tracking-widest animate-pulse">{t.identifying}</p>
                        </div>
                    )}

                    {/* Навигация */}
                    <nav className="fixed bottom-0 left-0 w-full glass border-t border-white/5 flex justify-around p-6 pb-10 z-50">
                        <button className="text-cyan-400 flex flex-col items-center gap-1">
                            <i data-lucide="home" className="w-5 h-5"></i>
                            <span className="text-[8px] font-black tracking-widest">ГЛАВНАЯ</span>
                        </button>
                        <button onClick={() => setModal('wallet')} className="text-gray-600 flex flex-col items-center gap-1">
                            <i data-lucide="wallet" className="w-5 h-5"></i>
                            <span className="text-[8px] font-black tracking-widest">КОШЕЛЕК</span>
                        </button>
                        <button onClick={() => setModal('safety')} className="text-gray-600 flex flex-col items-center gap-1">
                            <i data-lucide="shield" className="w-5 h-5"></i>
                            <span className="text-[8px] font-black tracking-widest">ЗАЩИТА</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes scan-fast { from { top: 0; } to { top: 100%; } }
        .animate-scan-fast { animation: scan-fast 2s linear infinite; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.4s ease-out; }
    </style>
</body>
</html>
