<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN | INFINITY ENGINE</title>
    <script src="https://telegram.org"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --bg: #010204; --sln: #00d4ff; --border: rgba(255, 255, 255, 0.05); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* ФИКС ФОНА - Звезды теперь всегда видны */
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: relative; }
        #space { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; background: transparent; }

        .container { 
            position: relative; z-index: 10; width: 100%; max-width: 420px; 
            margin: 0 auto; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; 
        }

        /* HEADER */
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3.5rem; }
        .brand { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 0.6rem; font-size: 1rem; display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* КАРТОЧКА */
        .card-main {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 2.5rem; padding: 3rem 2rem; backdrop-filter: blur(25px); margin-bottom: 2rem;
        }
        .val { font-size: 3.8rem; font-weight: 100; letter-spacing: -3px; color: #fff; line-height: 1; }
        .val.sln { color: var(--sln); text-shadow: 0 0 30px rgba(0, 212, 255, 0.3); margin-top: 2rem; font-size: 2.8rem; }
        .val span { font-size: 1.2rem; opacity: 0.2; margin-left: 10px; }

        /* КНОПКИ */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 2rem; padding: 2.5rem 1rem; position: relative; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
            transition: 0.3s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer;
        }
        .btn:active { transform: scale(0.92); border-color: var(--sln); box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
        .btn span { font-size: 0.7rem; font-weight: 900; opacity: 0.4; letter-spacing: 3px; text-transform: uppercase; }

        /* РАКЕТА - ТВОЙ ФАЙЛ ИЛИ SVG */
        .rocket-box { width: 60px; height: 80px; transition: 0.8s cubic-bezier(0.6, -0.28, 0.7, 0.05); position: relative; }
        .rocket-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px var(--sln)); }
        
        /* ЭФФЕКТ ВЗЛЕТА */
        .launching { transform: translateY(-120vh) scaleY(1.5) blur(5px); opacity: 0; }

        /* МОДАЛКА */
        .modal {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(1, 2, 4, 0.99); border-top: 2px solid var(--sln);
            border-radius: 3.5rem 3.5rem 0 0; padding: 3.5rem 2.5rem; z-index: 1000;
            backdrop-filter: blur(60px); box-shadow: 0 -20px 60px rgba(0, 212, 255, 0.3);
        }
        .m-item {
            padding: 1.5rem; margin-bottom: 1rem; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 1.8rem; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<canvas id="space"></canvas>

<div class="container">
    <div class="nav">
        <div class="brand">
            <img src="logo.png" class="logo-img" alt="S" onerror="this.style.display='none'">
            SELIN
        </div>
        <div style="font-size: 0.7rem; font-weight: 900; color: #ff3b30;">● OFFLINE</div>
    </div>

    <div class="card-main">
        <div class="val">0.00<span>TON</span></div>
        <div class="val sln">0.00<span>SLN</span></div>
    </div>

    <div class="grid">
        <div class="btn" onclick="openUI('DEPOSIT')">
            <div style="font-size: 2.2rem;">💳</div>
            <span>Внести</span>
        </div>
        
        <div class="btn" onclick="startRocket()">
            <div id="rocket-wrap" class="rocket-box">
                <!-- Пытаемся загрузить твой файл, если нет - показываем запасную ракету -->
                <img src="rocket.png" class="rocket-img" id="r-img" onerror="showBackupRocket(this)">
            </div>
            <span>Вывод</span>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div id="m-title" style="text-align: center; font-family: 'Orbitron'; color: var(--sln); margin-bottom: 2.5rem; letter-spacing: 5px;">SYSTEM</div>
    <div class="m-item" onclick="closeUI()"><span>1. SELIN ($SLN)</span> <span>⚡</span></div>
    <div class="m-item" onclick="closeUI()"><span>2. TONCOIN</span> <span>💎</span></div>
    <div class="m-item" onclick="closeUI()"><span>3. TETHER (USDT)</span> <span>💵</span></div>
    <button onclick="closeUI()" style="width:100%; margin-top:2.5rem; background:none; border:none; color:rgba(255,255,255,0.2); font-weight:900; cursor:pointer;">ЗАКРЫТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    function startRocket() {
        tg.HapticFeedback.notificationOccurred('success');
        const r = document.getElementById('rocket-wrap');
        r.classList.add('launching');
        setTimeout(() => {
            openUI('WITHDRAW');
            r.classList.remove('launching');
        }, 850);
    }

    function openUI(type) {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-title').innerText = type;
    }

    function closeUI() { document.getElementById('modal').style.display = 'none'; }

    function showBackupRocket(img) {
        // Если файла rocket.png нет, рисуем замену прямо здесь
        img.style.display = 'none';
        const backup = document.createElement('div');
        backup.innerHTML = `<svg viewBox="0 0 24 24" fill="#00d4ff" style="width:100%; height:100%"><path d="M12 2L15 9V16L12 18L9 16V9L12 2Z""")/>></svg>`;
        img.parentNode.appendChild(backup);
    }

    // ИСПРАВЛЕННЫЕ ЗВЕЗДЫ
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    let stars = Array(120).fill().map(() => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        size: Math.random() * 1.5, speed: Math.random() * 0.3 + 0.1
    }));

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
