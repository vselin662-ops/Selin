<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN PRESTIGE 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --accent-cyan: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --text-dim: #8a8f98;
            --neon-green: #00ff9d;
            --neon-purple: #bc00ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Анимированный фон (звезды и туманности) --- */
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05), transparent 70%);
            z-index: -1; pointer-events: none;
        }

        .app-wrapper {
            flex: 1;
            padding: calc(20px + env(safe-area-inset-top)) 20px 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- ХЕДЕР С ЛОГОТИПОМ --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px var(--accent-cyan));
            animation: logo-pulse 3s infinite ease-in-out;
        }

        @keyframes logo-pulse {
            0%, 100% { filter: drop-shadow(0 0 5px var(--accent-cyan)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 15px var(--accent-cyan)); transform: scale(1.05); }
        }

        .brand-name {
            font-family: 'Orbitron';
            font-size: 1.4rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 0.6rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 800;
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* --- КАРТОЧКИ АКТИВОВ (ТРИ ОКНА) --- */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .asset-window {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px 10px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .asset-window::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }

        .asset-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .asset-val { font-family: 'Orbitron'; font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
        .asset-sym { font-size: 0.6rem; font-weight: 800; opacity: 0.8; }

        .sym-sln { color: var(--accent-cyan); text-shadow: 0 0 8px var(--accent-cyan); }
        .sym-ton { color: #0088cc; text-shadow: 0 0 8px #0088cc; }
        .sym-usdt { color: #26a17b; text-shadow: 0 0 8px #26a17b; }

        /* --- ВАЖНО ЗНАТЬ (КНОПКА) --- */
        .important-btn {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.1), rgba(0, 0, 0, 0.4));
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.05);
        }

        .important-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 10px red);
        }

        .important-title { color: #ff3d3d; font-weight: 800; font-size: 0.9rem; margin-bottom: 2px; }
        .important-sub { color: var(--text-dim); font-size: 0.7rem; }

        /* --- КНОПКИ ДЕЙСТВИЙ (НЕОН) --- */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-card:active {
            transform: translateY(2px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .action-icon { font-size: 1.6rem; }
        .action-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: var(--text-dim); }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); display: none; z-index: 1000;
        }

        .modal {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0a0c10; border-top: 1px solid var(--accent-cyan);
            border-radius: 30px 30px 0 0; padding: 30px;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 1001; max-height: 85vh; overflow-y: auto;
        }

        .modal.active { transform: translateY(0); }

        .dl-btn {
            background: linear-gradient(90deg, var(--accent-cyan), #0088cc);
            color: #000; border: none; width: 100%; padding: 18px;
            border-radius: 15px; font-weight: 900; font-family: 'Orbitron';
            margin-top: 25px; cursor: pointer; text-transform: uppercase;
        }

        /* --- NAV BAR --- */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 7, 10, 0.8); border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; padding: 15px 10px 35px;
            backdrop-filter: blur(20px);
        }

        .nav-item { text-align: center; color: var(--text-dim); text-decoration: none; font-size: 0.65rem; transition: 0.3s; }
        .nav-item.active { color: var(--accent-cyan); text-shadow: 0 0 10px var(--accent-cyan); }
        .nav-item span { display: block; margin-top: 6px; }

    </style>
</head>
<body>

<canvas id="space-canvas"></canvas>
<div class="nebula"></div>

<div class="app-wrapper">
    <header class="header">
        <div class="logo-container">
            <!-- ВАШ ЛОГОТИП С GITHUB (заменен на raw ссылку для работы) -->
            <img src="https://raw.githubusercontent.com/vselin662-ops/Selin/main/logo.png" class="main-logo" alt="S">
            <span class="brand-name">SELIN</span>
        </div>
        <div class="status-badge">PROTECTED 2026</div>
    </header>

    <!-- ТРИ ОКНА АКТИВОВ -->
    <div class="assets-grid">
        <div class="asset-window">
            <div class="asset-label">Prestige</div>
            <div class="asset-val" id="sln-val">0.00</div>
            <div class="asset-sym sym-sln">SLN</div>
        </div>
        <div class="asset-window">
            <div class="asset-label">Main</div>
            <div class="asset-val" id="ton-val">0.00</div>
            <div class="asset-sym sym-ton">TON</div>
        </div>
        <div class="asset-window">
            <div class="asset-label">Reserve</div>
            <div class="asset-val" id="usdt-val">0.00</div>
            <div class="asset-sym sym-usdt">USDT</div>
        </div>
    </div>

    <!-- КНОПКА ВАЖНО ЗНАТЬ -->
    <div class="important-btn" onclick="openModal('safety')">
        <span class="important-icon">🚨</span>
        <div>
            <div class="important-title">ВАЖНО ЗНАТЬ</div>
            <div class="important-sub">Аналитика угроз и статистика мошенничества 2026</div>
        </div>
    </div>

    <!-- ДЕЙСТВИЯ -->
    <div class="actions-grid">
        <div class="action-card" onclick="openModal('deposit')">
            <span class="action-icon">💎</span>
            <span class="action-label">ВНЕСТИ</span>
        </div>
        <div class="action-card" onclick="openModal('withdraw')">
            <span class="action-icon">⚡</span>
            <span class="action-label">ВЫВОД</span>
        </div>
        <div class="action-card" onclick="openModal('swap')">
            <span class="action-icon">🔄</span>
            <span class="action-label">ОБМЕН</span>
        </div>
        <div class="action-card" onclick="openModal('reports')">
            <span class="action-icon">📈</span>
            <span class="action-label">ОТЧЕТЫ</span>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-item active">🏠<span>MAIN</span></a>
    <a href="#" class="nav-item" onclick="openModal('withdraw')">💼<span>WALLET</span></a>
    <a href="#" class="nav-item" onclick="openModal('safety')">🛡️<span>SAFETY</span></a>
</nav>

<!-- МОДАЛЬНОЕ ОКНО -->
<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 id="modal-title" style="font-family: Orbitron; font-size: 1rem; color: var(--accent-cyan);">INFO</h2>
        <button style="background: none; border: none; color: #fff; font-size: 1.5rem;" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-content" style="line-height: 1.6; color: #ccc;"></div>
</div>
