<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN PAY 2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020408;
            --accent-color: #00d4ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --sln-color: #00d4ff;
            --ton-color: #0088cc;
            --usdt-color: #26a17b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .app-wrapper {
            flex: 1;
            padding: calc(20px + env(safe-area-inset-top)) 15px 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- ШАПКА --- */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .status { color: #30d158; font-size: 0.7rem; font-weight: 800; border: 1px solid #30d158; padding: 2px 8px; border-radius: 5px; }

        /* --- КАРТОЧКИ АКТИВОВ (ТРИ ОКНА) --- */
        .assets-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .asset-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 15px 10px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .asset-card img { width: 24px; height: 24px; margin-bottom: 8px; }
        .asset-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .asset-value { font-size: 0.9rem; font-weight: 800; font-family: 'Orbitron'; }
        .asset-symbol { font-size: 0.6rem; display: block; margin-top: 2px; }

        .card-sln { border-bottom: 3px solid var(--sln-color); }
        .card-ton { border-bottom: 3px solid var(--ton-color); }
        .card-usdt { border-bottom: 3px solid var(--usdt-color); }

        /* --- КНОПКА ВАЖНО ЗНАТЬ --- */
        .important-bar {
            background: linear-gradient(90deg, rgba(255,69,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid #ff4500;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }

        /* --- СЕТКА КНОПОК --- */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn-action {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .btn-icon { font-size: 1.5rem; }
        .btn-text { font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); display: none; z-index: 1000;
        }
        .modal {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0d1117; border-top: 2px solid var(--accent-color);
            border-radius: 25px 25px 0 0; padding: 25px;
            transform: translateY(100%); transition: 0.4s; z-index: 1001;
            max-height: 80vh; overflow-y: auto;
        }
        .modal.active { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; color: #fff; font-size: 1.5rem; }

        .dl-btn {
            background: var(--accent-color); color: #000; border: none;
            width: 100%; padding: 15px; border-radius: 12px; font-weight: 800;
            margin-top: 20px; cursor: pointer;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 15, 25, 0.95); border-top: 1px solid var(--card-border);
            display: flex; justify-content: space-around; padding: 15px 10px 35px;
        }
        .nav-item { text-align: center; color: var(--text-dim); text-decoration: none; font-size: 0.7rem; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { display: block; margin-top: 4px; }
    </style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<div class="app-wrapper">
    <header class="header">
        <div class="brand">
            <span style="color:var(--accent-color)">🛡️</span> SELIN PAY
        </div>
        <div class="status">● SECURE</div>
    </header>

    <!-- ТРИ ОКНА АКТИВОВ -->
    <div class="assets-container">
        <div class="asset-card card-sln">
            <div class="asset-label">Selin</div>
            <div class="asset-value" id="val-sln">4,800</div>
            <div class="asset-symbol" style="color:var(--sln-color)">SLN</div>
        </div>
        <div class="asset-card card-ton">
            <div class="asset-label">Toncoin</div>
            <div class="asset-value" id="val-ton">1,250</div>
            <div class="asset-symbol" style="color:var(--ton-color)">TON</div>
        </div>
        <div class="asset-card card-usdt">
            <div class="asset-label">Tether</div>
            <div class="asset-value" id="val-usdt">350.5</div>
            <div class="asset-symbol" style="color:var(--usdt-color)">USDT</div>
        </div>
    </div>

    <!-- ВАЖНО ЗНАТЬ -->
    <div class="important-bar" onclick="openCustomModal('safety')">
        <span style="font-size: 2rem;">⚠️</span>
        <div>
            <div style="font-weight: 900; color: #ff4500; font-size: 0.9rem;">ВАЖНО ЗНАТЬ</div>
            <div style="font-size: 0.7rem; opacity: 0.8;">Криптоугрозы и статистика 2026</div>
        </div>
    </div>

    <!-- КНОПКИ ДЕЙСТВИЙ -->
    <div class="actions-grid">
        <div class="btn-action" onclick="openCustomModal('deposit')">
            <span class="btn-icon">💳</span>
            <span class="btn-text">ВНЕСТИ</span>
        </div>
        <div class="btn-action" onclick="openCustomModal('withdraw')">
            <span class="btn-icon">🚀</span>
            <span class="btn-text">ВЫВОД</span>
        </div>
        <div class="btn-action" onclick="openCustomModal('swap')">
            <span class="btn-icon">🔄</span>
            <span class="btn-text">ОБМЕН</span>
        </div>
        <div class="btn-action" onclick="openCustomModal('reports')">
            <span class="btn-icon">📊</span>
            <span class="btn-text">ОТЧЕТЫ</span>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-item active">🏠<span>Главная</span></a>
    <a href="#" class="nav-item" onclick="openCustomModal('withdraw')">💼<span>Кошелек</span></a>
    <a href="#" class="nav-item" onclick="openCustomModal('safety')">🛡️<span>Защита</span></a>
</nav>

<!-- МОДАЛКИ -->
<div class="modal-overlay" id="overlay" onclick="closeCustomModal()"></div>
<div class="modal" id="modal">
    <div class="modal-header">
        <h2 id="modal-title" style="font-family: Orbitron; font-size: 1rem;">INFO</h2>
        <button class="close-btn" onclick="closeCustomModal()">✕</button>
    </div>
    <div id="modal-content"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const reportText = `ОТЧЕТ SELIN PAY 2026:
-------------------------
Статистика хищений: $19.2 млрд.
Главная угроза: ИИ-фишинг (60% атак).
Защита: Engine 2.0 блокирует 99% дрейнеров.
Рекомендация: Не храните более 10k TON на горячих кошельках.`;

    const modalData = {
        'safety': {
            title: 'БЕЗОПАСНОСТЬ 2026',
            html: `
                <div style="color:#eee; line-height:1.5;">
                    <p style="margin-bottom:15px; color: #ff4500; font-weight:bold;">⚠️ Критическая информация 2026</p>
                    <p>В этом году зафиксирован рекордный рост атак на TON-кошельки с использованием нейросетей.</p>
                    <ul style="margin: 15px 0; padding-left: 20px;">
                        <li>Общие потери в мире: <b>$19.2 млрд</b></li>
                        <li>Новый вид атак: <b>AI Voice Drainer</b></li>
                        <li>Безопасность SELIN: <b>Максимальная</b></li>
                    </ul>
                    <button class="dl-btn" onclick="downloadFile()">СКАЧАТЬ ПОЛНЫЙ ОТЧЕТ (.TXT)</button>
                </div>`
        },
        'deposit': { title: 'ПОПОЛНЕНИЕ', html: '<p>Ваш адрес: <br><code style="color:var(--accent-color)">UQBeR...selin_v2</code></p>' },
        'withdraw': { title: 'ВЫВОД', html: '<p>Введите сумму и адрес для вывода из системы SELIN.</p>' },
        'swap': { title: 'ОБМЕН', html: '<p>Курс: 1 TON = 4.5 USDT</p>' },
        'reports': { title: 'ВАШИ ОТЧЕТЫ', html: '<p>История транзакций пуста.</p>' }
    };

    function openCustomModal(type) {
        const data = modalData[type];
        document.getElementById('modal-title').innerText = data.title;
        document.getElementById('modal-content').innerHTML = data.html;
        document.getElementById('overlay').style.display = 'block';
        setTimeout(() => document.getElementById('modal').classList.add('active'), 10);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeCustomModal() {
        document.getElementById('modal').classList.remove('active');
        setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
    }

    function downloadFile() {
        const blob = new Blob([reportText], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Selin_Report_2026.txt';
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        tg.HapticFeedback.notificationOccurred('success');
    }

    // --- ЗВЕЗДЫ ---
    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<80; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * canvas.width,
                size: Math.random() * 1.5
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            s.y -= 0.5;
            if(s.y < 0) s.y = canvas.height;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', initStars);
    initStars();
    drawStars();

</script>
</body>
</html>
