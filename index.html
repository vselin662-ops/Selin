<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN PAY | Web3 Ecosystem</title>
    
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --bg: #070b10; --accent: #0088cc; --sln: #00d4ff; --glass: rgba(255, 255, 255, 0.04); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); background-image: radial-gradient(circle at 50% 0%, #1c2a3d 0%, #070b10 100%); color: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        .app-shell { width: 100%; max-width: 400px; padding: 25px; display: flex; flex-direction: column; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--accent); box-shadow: 0 0 15px rgba(0, 136, 204, 0.3); }
        .brand { font-weight: 900; font-size: 1.3rem; letter-spacing: 2px; color: var(--accent); }
        
        .status { font-size: 9px; font-weight: 800; padding: 6px 12px; border-radius: 30px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #ff3b30; }
        .active .dot { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        /* Карточка активов */
        .asset-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 25px; margin-bottom: 30px; backdrop-filter: blur(25px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .asset { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .asset:first-child { border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
        .a-label { font-size: 10px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
        .a-val { font-size: 36px; font-weight: 200; }
        .a-val span { font-size: 18px; opacity: 0.3; margin-left: 6px; }
        .sln-text { color: var(--sln); text-shadow: 0 0 20px rgba(0, 212, 255, 0.2); font-weight: 400; }

        /* Сетка управления */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; padding: 22px 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .btn i { font-size: 26px; display: block; margin-bottom: 10px; }
        .btn span { font-size: 11px; font-weight: 700; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        #ton-connect-btn { margin-bottom: 25px; display: flex; justify-content: center; }
        #sys-info { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 9px; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div class="logo-box">
            <img src="logo.png" class="logo-img" alt="S">
            <div class="brand">SELIN</div>
        </div>
        <div class="status" id="st-box">
            <div class="dot"></div> <span id="st-txt">OFFLINE</span>
        </div>
    </div>

    <div id="ton-connect-btn"></div>

    <div class="asset-card">
        <div class="asset">
            <div>
                <div class="a-label">Blockchain Base</div>
                <div class="a-val" id="t-bal">0.00<span>TON</span></div>
            </div>
            <div style="font-size: 24px; opacity: 0.8;">💎</div>
        </div>
        <div class="asset">
            <div>
                <div class="a-label" style="color: var(--sln); opacity: 0.8;">Selin Asset ($SLN)</div>
                <div class="a-val sln-text" id="s-bal">0.00<span>SLN</span></div>
            </div>
            <div style="font-size: 24px;">🚀</div>
        </div>
    </div>

    <div class="grid">
        <div class="btn" onclick="hapt('medium'); tg.showAlert('Интеграция с СБП в разработке...')"><i>💳</i><span>Внести</span></div>
        <div class="btn" onclick="hapt('medium'); tg.showAlert('Минимум 10.0 TON')"><i>🚀</i><span>Вывод</span></div>
        <div class="btn" style="grid-column: span 2; background: rgba(0, 136, 204, 0.1); border-color: var(--accent);" onclick="sendPay()"><i>💎</i><span>Оплатить в TON</span></div>
    </div>
</div>

<div id="sys-info">Protocol: SELIN PAY v2.0 | Engine: Web3 TON | Hardware: Pixel 8 Native</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const CONFIG = {
        MY_WALLET: "UQCJqiuwFj-TzWMK9XwTzS-v-TaaGc37PaemsMHfmQ-bnDon",
        SLN_MASTER: "EQCkDna5aow1EBkSydhTrBvARuhGlBC6LntyUlZscx8KzBW7",
        MANIFEST: "https://vselin662-ops.github.io"
    };

    const tonUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: CONFIG.MANIFEST,
        buttonRootId: 'ton-connect-btn'
    });

    const hapt = (s) => tg.HapticFeedback.impactOccurred(s);

    async function refreshAssets(address) {
        try {
            // 1. Получаем баланс TON
            const r1 = await fetch(`https://toncenter.com{address}`);
            const d1 = await r1.json();
            if(d1.ok) document.getElementById('t-bal').innerHTML = `${(d1.result.balance / 1e9).toFixed(2)}<span>TON</span>`;

            // 2. Получаем баланс $SLN (Jetton)
            const r2 = await fetch(`https://toncenter.com{address}&jetton_master_address=${CONFIG.SLN_MASTER}`);
            const d2 = await r2.json();
            if(d2.ok) {
                const r3 = await fetch(`https://toncenter.com{d2.result}`);
                const d3 = await r3.json();
                if(d3.ok) document.getElementById('s-bal').innerHTML = `${(d3.result.balance / 1e9).toLocaleString()}<span>SLN</span>`;
            }
        } catch(e) { console.error("Blockchain Sync Failed"); }
    }

    tonUI.onStatusChange(w => {
        const box = document.getElementById('st-box');
        const txt = document.getElementById('st-txt');
        if (w) {
            box.classList.add('active');
            txt.innerText = 'NODE ACTIVE';
            hapt('heavy');
            refreshAssets(w.account.address);
            setInterval(() => refreshAssets(w.account.address), 20000);
        } else {
            box.classList.remove('active');
            txt.innerText = 'OFFLINE';
        }
    });

    async function sendPay() {
        hapt('medium');
        if (!tonUI.connected) return tg.showAlert("Подключите кошелек!");
        try {
            await tonUI.sendTransaction({
                validUntil: Math.floor(Date.now() / 1000) + 120,
                messages: [{ address: CONFIG.MY_WALLET, amount: "1000000000" }]
            });
            tg.HapticFeedback.notificationOccurred('success');
        } catch (e) { hapt('error'); }
    }
</script>
</body>
</html>
