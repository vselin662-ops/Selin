<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN LUXURY</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #000; }
        body { 
            background: var(--bg); color: white; margin: 0; 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
        }

        /* Эффект матового стекла (Glassmorphism 2026) */
        .luxury-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 20px;
            width: 85%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .price { font-size: 42px; font-weight: 900; margin: 20px 0; color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        .btn-pay {
            background: white; color: black; border: none;
            padding: 20px; width: 100%; border-radius: 20px;
            font-size: 18px; font-weight: 800; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="luxury-card">
        <h1 style="letter-spacing: -1px;">PREMIUM ACCESS</h1>
        <p style="opacity: 0.5;">Эксклюзивная подписка Selin</p>
        <div class="price">250 STARS</div>
        <button class="btn-pay" onclick="pay()">ОПЛАТИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function pay() {
            tg.HapticFeedback.notificationOccurred('success');
            // Здесь будет логика вызова счета через бота
            alert("Запрос на оплату отправлен боту!");
        }
    </script>
</body>
</html>
