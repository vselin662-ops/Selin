<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELIN PAY</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #222; border-radius: 30px; padding: 40px; width: 320px; background: #050505; text-align: center; }
        #ton-connect-button { margin-bottom: 20px; min-height: 40px; } /* Место для кнопки */
        #node-status { font-size: 10px; letter-spacing: 1px; margin-bottom: 10px; transition: 0.5s; }
        .balance-label { color: #555; font-size: 14px; }
        .balance-val { font-size: 48px; font-weight: bold; margin: 10px 0 30px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #1a1a1a; border: none; border-radius: 15px; color: #fff; padding: 18px 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
        button:active { background: #333; transform: scale(0.98); }
        .footer { margin-top: 30px; font-size: 10px; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>SELIN PAY</h2>
    
    <!-- Сюда скрипт вставит синюю кнопку Connect Wallet -->
    <div id="ton-connect-button"></div>

    <div id="node-status" style="color: #ff3b30;">NODE OFFLINE</div>
    
    <div class="balance-label">Ваш баланс</div>
    <div class="balance-val" id="user-balance">0.00 ₽</div>

    <div class="grid">
        <button onclick="deposit('RUB')">💳 Внести (₽)</button>
        <button onclick="deposit('TON')">💎 TON</button>
        <button onclick="deposit('USDT')">💵 USDT</button>
        <button onclick="window.location.href='https://t.me'">💬 Связь</button>
    </div>

    <div class="footer">vselin662-ops ecosystem</div>
</div>

<script>
    // Инициализация
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://vselin662-ops.github.io',
        buttonRootId: 'ton-connect-button'
    });

    // Следим за статусом
    tonConnectUI.onStatusChange(wallet => {
        const status = document.getElementById('node-status');
        if (wallet) {
            status.innerText = 'NODE ACTIVE';
            status.style.color = '#34c759';
            // Если кошелек подключен, можно "нарисовать" баланс для вида
            document.getElementById('user-balance').innerText = '145.00 ₽';
        } else {
            status.innerText = 'NODE OFFLINE';
            status.style.color = '#ff3b30';
            document.getElementById('user-balance').innerText = '0.00 ₽';
        }
    });

    async function deposit(type) {
        const wallet = tonConnectUI.wallet;
        
        if (!wallet && type !== 'RUB') {
            alert('Сначала нажмите синюю кнопку "Connect Wallet"!');
            return;
        }

        if (type === 'TON') {
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "UQCmsvJfKVODb1vxdqzilJqicSuhPs0JzNNmzn_4VLWKOEw7",
                    amount: "1000000000" // 1 TON
                }]
            };
            try {
                await tonConnectUI.sendTransaction(tx);
            } catch (e) {
                alert('Оплата отменена');
            }
        } else {
            alert('Эта платежная система сейчас настраивается...');
        }
    }
</script>

</body>
</html>
