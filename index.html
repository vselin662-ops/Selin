<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN777 PREMIUM FINTECH</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #030508; --card: #0d1117; --accent: #00a2ff; --text-dim: #4e5a6e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Эффект свечения на фоне */
        body::before { content: ''; position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(0, 162, 255, 0.15) 0%, transparent 70%); z-index: -1; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .status-pill { background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 5px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; letter-spacing: 1px; border: 1px solid rgba(0, 255, 136, 0.2); }

        /* Главная карта баланса */
        .balance-card {
            background: linear-gradient(160deg, #121822 0%, #080c12 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px; padding: 35px 25px; margin-bottom: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.02);
            text-align: center;
        }
        .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .main-val { font-size: 62px; font-weight: 200; display: flex; justify-content: center; align-items: baseline; gap: 8px; color: #fff; }
        .main-val b { font-weight: 700; }
        
        .curr-selector { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
        .c-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: var(--text-dim); padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .c-btn.active { color: white; background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 162, 255, 0.4); }

        /* Кнопки действий */
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .act-item {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 25px; text-align: center;
            transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .act-item:active { transform: scale(0.95); background: rgba(0, 162, 255, 0.05); }
        .act-item i { font-size: 24px; display: block; margin-bottom: 10px; }
        .act-item div { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #e0e0e0; }

        /* Футер неон */
        .footer-glow { position: fixed; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 25px var(--accent); opacity: 0.6; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SELIN<span>777</span></div>
        <div class="status-pill">● SECURE 2026</div>
    </div>

    <div class="balance-card">
        <div class="label">Активы кошелька</div>
        <div class="main-val"><b id="val">0.00</b> <span id="symbol" style="font-size: 28px; color: var(--text-dim);">₽</span></div>
        <div class="curr-selector">
            <button class="c-btn active" onclick="chg('RUB', '₽')">RUB</button>
            <button class="c-btn" onclick="chg('USDT', '₮')">USDT</button>
            <button class="c-btn" onclick="chg('BTC', '₿')">BTC</button>
        </div>
    </div>

    <div class="actions-grid">
        <div class="act-item" onclick="act('Внести')"><i>📥</i><div>Внести</div></div>
        <div class="act-item" onclick="act('Вывод')"><i>📤</i><div>Вывод</div></div>
        <div class="act-item" onclick="act('Обмен')"><i>🔄</i><div>Обмен</div></div>
        <div class="act-item" onclick="act('Связь')"><i>📱</i><div>Связь</div></div>
    </div>

    <div class="footer-glow"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#030508');

        function chg(n, s) {
            tg.HapticFeedback.selectionChanged();
            document.getElementById('symbol').innerText = s;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function act(type) {
            tg.HapticFeedback.impactOccurred('medium');
            if(type === 'Связь') {
                tg.showPopup({ title: 'Оплата связи', message: 'Введите номер для мгновенного пополнения.', buttons: });
            } else {
                tg.showAlert(`Модуль "${type}" активен. Ожидание авторизации ноды.`);
            }
        }
    </script>
</body>
</html>
