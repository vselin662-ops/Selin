<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SELIN ENGINE 2.0</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #010204;
            --sln: #00d4ff;
            --border: rgba(255, 255, 255, 0.08);
            --neon: 0 0 25px rgba(0, 212, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff; height: 100vh; overflow: hidden;
            display: flex; justify-content: center;
            position: relative;
        }

        #space { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .nebula { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 136, 204, 0.15), transparent 70%); filter: blur(90px); z-index: -1; pointer-events: none; top: -10%; right: -10%; }

        .container {
            width: 100%; max-width: 420px; padding: 2.5rem 1.5rem;
            display: flex; flex-direction: column; z-index: 10; position: relative;
        }

        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3.5rem; }
        .brand { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 0.6rem; font-size: 1rem; display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(0, 212, 255, 0.2); }

        .status-dot {
            font-size: 0.7rem; font-weight: 900;
            transition: color 0.4s, text-shadow 0.4s;
        }
        .status-dot.offline { color: #ff3b30; text-shadow: 0 0 10px rgba(255,59,48,0.5); }
        .status-dot.online  { color: #30d158; text-shadow: 0 0 10px rgba(48,209,88,0.5); }

        .card-main {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border); border-radius: 2.5rem;
            padding: 3rem 2rem; backdrop-filter: blur(25px);
            margin-bottom: 2rem; position: relative;
        }
        .label { font-size: 0.65rem; font-weight: 900; color: var(--sln); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 1.5rem; opacity: 0.6; }

        .val { font-size: 3.8rem; font-weight: 100; letter-spacing: -3px; color: #fff; line-height: 1; }
        .val.sln { color: var(--sln); text-shadow: var(--neon); margin-top: 2rem; font-size: 2.8rem; }
        .val span { font-size: 1.1rem; opacity: 0.2; margin-left: 10px; font-weight: 400; }

        .skeleton {
            display: inline-block;
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 1em; width: 140px; vertical-align: middle;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; position: relative; z-index: 100; }
        .btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 2.2rem; padding: 2.8rem 1rem;
            display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
            transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer;
        }
        .btn:active { transform: scale(0.92); border-color: var(--sln); box-shadow: 0 0 40px rgba(0, 212, 255, 0.3); }
        .btn span { font-size: 0.75rem; font-weight: 900; opacity: 0.4; letter-spacing: 3px; text-transform: uppercase; }

        .rocket-box { width: 55px; height: 75px; transition: 0.8s cubic-bezier(0.6, -0.28, 0.7, 0.05); }
        .rocket-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px var(--sln)); }
        .launching { transform: translateY(-120vh) scaleY(1.5); opacity: 0; }

        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1999;
        }
        .overlay.show { display: block; }

        .modal {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(1, 2, 4, 0.99); border-top: 2px solid var(--sln);
            border-radius: 3.5rem 3.5rem 0 0; padding: 3.5rem 2.5rem; z-index: 2000;
            backdrop-filter: blur(60px); box-shadow: 0 -20px 60px rgba(0, 212, 255, 0.4);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .modal.open { transform: translateY(0); }

        .swipe-bar {
            width: 50px; height: 5px; border-radius: 99px;
            background: rgba(255,255,255,0.15); margin: 0 auto 2.5rem;
        }

        .m-item {
            padding: 1.6rem; margin-bottom: 1rem; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 1.8rem;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .m-item:active { border-color: var(--sln); color: var(--sln); box-shadow: var(--neon); }

        .history-section { margin-top: 2rem; }
        .history-title { font-size: 0.65rem; font-weight: 900; color: var(--sln); text-transform: uppercase; letter-spacing: 4px; opacity: 0.6; margin-bottom: 1rem; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.9rem 1.2rem; margin-bottom: 0.6rem;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 1.2rem; font-size: 0.8rem;
        }
        .history-item .h-type { opacity: 0.5; letter-spacing: 2px; font-weight: 900; text-transform: uppercase; font-size: 0.65rem; }
        .history-item .h-amount { font-weight: 900; }
        .history-item .h-amount.plus  { color: #30d158; }
        .history-item .h-amount.minus { color: #ff3b30; }
        .history-empty { text-align: center; opacity: 0.2; font-size: 0.75rem; letter-spacing: 3px; padding: 1rem 0; }

        .listing-tag { text-align: center; margin-top: 2.5rem; font-size: 0.8rem; font-weight: 900; color: var(--sln); letter-spacing: 4px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; text-shadow: 0 0 15px var(--sln); } }

        .modal-title {
            text-align: center; font-family: 'Orbitron'; font-weight: 900;
            color: var(--sln); margin-bottom: 2rem; letter-spacing: 5px;
        }
    </style>
</head>
<body>

<canvas id="space"></canvas>
<div class="nebula"></div>

<div class="container">
    <div class="nav">
        <div class="brand">
            <img src="logo.png" class="logo-img" alt="S" onerror="this.style.display='none'">
            SELIN
        </div>
        <div id="status-indicator" class="status-dot offline">● OFFLINE</div>
    </div>

    <div class="card-main">
        <div class="label">Infinity Balance</div>
        <div class="val" id="ton-balance"><span class="skeleton"></span></div>
        <div class="val sln" id="sln-balance"><span class="skeleton" style="width:110px;height:0.8em;"></span></div>
    </div>

    <div class="grid">
        <div class="btn" onclick="openUI('DEPOSIT')">
            <div style="font-size: 2.4rem; filter: drop-shadow(0 0 10px #fff);">💳</div>
            <span>Внести</span>
        </div>

        <div class="btn" onclick="triggerRocket()">
            <div id="rocket-id" class="rocket-box">
                <img src="rocket.png" class="rocket-img" alt="🚀" onerror="this.style.opacity='0.5'">
            </div>
            <span>Вывод</span>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeUI()"></div>

<div id="modal-ui" class="modal">
    <div class="swipe-bar"></div>
    <div id="m-title" class="modal-title">PROTOCOL</div>

    <div id="deposit-content">
        <div class="m-item"><span>1. SELIN ($SLN)</span> <span>⚡</span></div>
        <div class="m-item"><span>2. TONCOIN</span> <span>💎</span></div>
        <div class="m-item"><span>3. TETHER (USDT)</span> <span>💵</span></div>
        <div class="listing-tag">COMING SOON: SLN LISTING</div>
    </div>

    <div id="withdraw-content" style="display:none;">
        <div class="m-item"><span>1. SELIN ($SLN)</span> <span>⚡</span></div>
        <div class="m-item"><span>2. TONCOIN</span> <span>💎</span></div>
        <div class="m-item"><span>3. TETHER (USDT)</span> <span>💵</span></div>

        <div class="history-section">
            <div class="history-title">История</div>
            <div id="history-list"></div>
        </div>
    </div>

    <button onclick="closeUI()" style="width:100%; margin-top:2rem; background:none; border:none; color:rgba(255,255,255,0.2); font-weight:900; letter-spacing:3px; cursor:pointer;">ABORT SYSTEM</button>
</div>

<script>
    const tg = window.Telegram?.WebApp ?? null;
    if (tg) { tg.ready(); tg.expand(); }

    function haptic(type, value) {
        if (!tg?.HapticFeedback) return;
        if (type === 'notification') tg.HapticFeedback.notificationOccurred(value);
        if (type === 'impact') tg.HapticFeedback.impactOccurred(value);
    }

    const CACHE_KEY = 'selin_balance_cache';

    function renderBalance(ton, sln) {
        document.getElementById('ton-balance').innerHTML = `${ton.toFixed(2)}<span>TON</span>`;
        document.getElementById('sln-balance').innerHTML = `${sln.toFixed(2)}<span>SLN</span>`;
    }

    function loadBalance() {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            const { ton, sln } = JSON.parse(cached);
            renderBalance(ton, sln);
        }

        setTimeout(() => {
            const ton = parseFloat((Math.random() * 10).toFixed(2));
            const sln = parseFloat((Math.random() * 5000).toFixed(2));
            renderBalance(ton, sln);
            localStorage.setItem(CACHE_KEY, JSON.stringify({ ton, sln }));
            setOnline(true);
        }, 1200);
    }

    function setOnline(isOnline) {
        const el = document.getElementById('status-indicator');
        if (isOnline) {
            el.textContent = '● ONLINE';
            el.className = 'status-dot online';
        } else {
            el.textContent = '● OFFLINE';
            el.className = 'status-dot offline';
        }
    }

    function getHistory() {
        return JSON.parse(localStorage.getItem('selin_history') || '[]');
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const history = getHistory();
        if (history.length === 0) {
            list.innerHTML = '<div class="history-empty">НЕТ ОПЕРАЦИЙ</div>';
            return;
        }
        list.innerHTML = history.map(h => `
            <div class="history-item">
                <div>
                    <div class="h-type">${h.type === 'deposit' ? 'Пополнение' : 'Вывод'}</div>
                    <div style="font-size:0.7rem; opacity:0.3; margin-top:2px;">${h.date}</div>
                </div>
                <div class="h-amount ${h.type === 'deposit' ? 'plus' : 'minus'}">
                    ${h.type === 'deposit' ? '+' : '-'}${h.amount} ${h.currency}
                </div>
            </div>
        `).join('');
    }

    function triggerRocket() {
        haptic('notification', 'success');
        const rkt = document.getElementById('rocket-id');
        rkt.classList.add('launching');

        setTimeout(() => {
            openUI('WITHDRAW');
            setTimeout(() => {
                rkt.style.transition = '0s';
                rkt.classList.remove('launching');
                setTimeout(() => { rkt.style.transition = '0.8s cubic-bezier(0.6, -0.28, 0.7, 0.05)'; }, 50);
            }, 500);
        }, 850);
    }

    function openUI(type) {
        haptic('impact', 'medium');
        const modal    = document.getElementById('modal-ui');
        const overlay  = document.getElementById('overlay');
        const title    = document.getElementById('m-title');
        const deposit  = document.getElementById('deposit-content');
        const withdraw = document.getElementById('withdraw-content');

        if (type === 'DEPOSIT') {
            title.innerText = 'ПОПОЛНЕНИЕ';
            deposit.style.display  = 'block';
            withdraw.style.display = 'none';
        } else {
            title.innerText = 'ВЫВОД СРЕДСТВ';
            deposit.style.display  = 'none';
            withdraw.style.display = 'block';
            renderHistory();
        }

        overlay.classList.add('show');
        requestAnimationFrame(() => modal.classList.add('open'));
    }

    function closeUI() {
        document.getElementById('modal-ui').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }

    // Свайп вниз для закрытия
    let touchStartY = 0;
    const modal = document.getElementById('modal-ui');

    modal.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    modal.addEventListener('touchmove', e => {
        const dy = e.touches[0].clientY - touchStartY;
        if (dy > 0) modal.style.transform = `translateY(${dy}px)`;
    }, { passive: true });
    modal.addEventListener('touchend', e => {
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (dy > 80) {
            closeUI();
        } else {
            modal.style.transform = '';
        }
        setTimeout(() => { modal.style.transform = ''; }, 400);
    });

    // Звёздный движок
    const cvs = document.getElementById('space');
    const ctx = cvs.getContext('2d');
    function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    let stars = Array(150).fill().map(() => ({
        x: Math.random() * cvs.width,
        y: Math.random() * cvs.height,
        size: Math.random() * 1.8,
        speed: Math.random() * 0.4 + 0.1,
        opacity: Math.random()
    }));

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            s.y -= s.speed; if (s.y < 0) s.y = cvs.height;
        });
        requestAnimationFrame(draw);
    }
    draw();

    loadBalance();
</script>
</body>
</html>
